<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Eletrônico 24 horas</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <main>
        <h1>Caixa Eletrônico <strong>24 horas</strong></h1>
        <h2 id="saldo">Saldo: R$ 0,00</h2>

        <!-- Área de Depósito -->
        <input type="number" id="valorDeposito" placeholder="Valor a depositar" min="0" step="0.01">
        <button onclick="caixa.depositar()">Depositar</button>

        <!-- Área de Saque -->
        <input type="number" id="valorSaque" placeholder="Valor a sacar" min="0" step="0.01">
        <button onclick="caixa.sacar()">Sacar</button>
    </main>
    
    <script src="scripts.js"></script>
</body>
</html>
